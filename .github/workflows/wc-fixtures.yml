name: WC fixtures

on:
  schedule:
    # Kas 6 val. (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # leidžia paleisti rankiniu būdu iš Actions skilties

permissions:
  contents: write

concurrency:
  group: wc-fixtures
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Fetch fixtures
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          TZ_NAME: Europe/Vilnius
          OUT_PATH: assets/wc/matches.json
        run: python fetch_wc_fixtures.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/wc/matches.json
          if git diff --staged --quiet; then
            echo "Jokių pakeitimų – nieko necommitinam."
          else
            git commit -m "Atnaujintos varžybos (auto)"
            git push
          fi
